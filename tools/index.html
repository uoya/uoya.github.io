<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>週間予定テキストジェネレーター</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style type="text/tailwindcss">
    @theme {
      --color-brand: #3b82f6;
    }
    .toggle-btn {
      @apply px-3 py-1.5 rounded-md text-sm font-medium border cursor-pointer select-none transition-colors;
    }
    .toggle-btn.active {
      @apply bg-blue-600 text-white border-blue-600;
    }
    .toggle-btn:not(.active) {
      @apply bg-white text-gray-600 border-gray-300 hover:bg-gray-50;
    }
    /* Hide native date input, show only via click */
    .date-trigger { @apply relative cursor-pointer; }
    .date-trigger input[type="date"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
  </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden">
  <div class="max-w-2xl mx-auto px-4 pt-4 pb-2 w-full flex flex-col min-h-0 flex-1">

    <!-- Header + Date Range -->
    <div class="shrink-0 mb-3">
      <h1 class="text-lg font-bold text-gray-800 mb-3">週間予定テキスト作成</h1>
      <div class="bg-white rounded-lg shadow-sm border px-4 py-2.5 flex items-center gap-3">
        <span class="text-sm text-gray-500 shrink-0">期間</span>
        <div class="date-trigger inline-flex items-center border rounded-md px-3 py-1 bg-gray-50">
          <span id="startLabel" class="text-sm font-medium tabular-nums"></span>
          <input type="date" id="startDate" class="text-sm">
        </div>
        <span class="text-gray-400 shrink-0">〜</span>
        <div class="date-trigger inline-flex items-center border rounded-md px-3 py-1 bg-gray-50">
          <span id="endLabel" class="text-sm font-medium tabular-nums"></span>
          <input type="date" id="endDate" class="text-sm">
        </div>
      </div>
    </div>

    <!-- Schedule Rows (scrollable) -->
    <div id="scheduleRows" class="space-y-2 flex-1 overflow-y-auto min-h-0 pb-2"></div>

    <!-- Output (sticky bottom) -->
    <div class="shrink-0 bg-white rounded-lg shadow-sm border p-3 mt-2">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-medium text-gray-700">出力</span>
        <div class="flex gap-2">
          <button id="recreateBtn" class="px-2.5 py-1 bg-amber-500 text-white text-xs rounded-md hover:bg-amber-600 cursor-pointer transition-colors">
            <i class="fa-solid fa-arrows-rotate mr-0.5"></i>再作成
          </button>
          <button id="resetBtn" class="px-2.5 py-1 bg-gray-500 text-white text-xs rounded-md hover:bg-gray-600 cursor-pointer transition-colors">
            <i class="fa-solid fa-rotate-left mr-0.5"></i>リセット
          </button>
          <button id="copyBtn" class="px-2.5 py-1 bg-green-600 text-white text-xs rounded-md hover:bg-green-700 cursor-pointer transition-colors">
            <i class="fa-regular fa-copy mr-0.5"></i>コピー
          </button>
        </div>
      </div>
      <textarea id="output" rows="5" class="w-full border rounded-md p-2.5 text-sm font-mono resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
      <p id="copyFeedback" class="text-xs text-green-600 mt-1 hidden">クリップボードにコピーしました</p>
    </div>
  </div>

  <script>
    // ── Constants ──

    const DAYS = ['日', '月', '火', '水', '木', '金', '土'];

    const FIELDS = {
      work: {
        office: { btn: '💼出勤', text: '💼出勤' },
        home:   { btn: '🏠在宅', text: '在宅' },
        flip: { office: 'home', home: 'office' },
        activeVal: 'office',
      },
      lunch: {
        bento:     { btn: '🍱弁当',     text: '🍱' },
        'eat-out': { btn: '🍽️弁当不要', text: '🍽️弁当不要' },
        flip: { bento: 'eat-out', 'eat-out': 'bento' },
        activeVal: 'bento',
      },
      dinner: {
        home:      { btn: '🏠家で夕食', text: '' },
        'eat-out': { btn: '🍽️夕飯不要', text: '夕飯不要' },
        flip: { home: 'eat-out', 'eat-out': 'home' },
        activeVal: 'home',
      },
    };

    // ── Pure functions: dates ──

    const today = () => {
      const d = new Date();
      return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    };

    const formatDateValue = (d) =>
      `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

    const formatLabel = (s) => { const [, m, d] = s.split('-'); return `${parseInt(m)}/${parseInt(d)}`; };

    const parseDateValue = (s) => { const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d); };

    const defaultRange = () => {
      const start = today(), end = new Date(start);
      end.setDate(end.getDate() + 6);
      return { start: formatDateValue(start), end: formatDateValue(end) };
    };

    const dateRange = (start, end) => {
      const dates = [];
      for (const d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) dates.push(new Date(d));
      return dates;
    };

    // ── Pure functions: row model ──

    const createRow = (date) => {
      const dow = date.getDay();
      return { date, enabled: dow !== 0 && dow !== 6, work: 'office', lunch: 'bento', dinner: 'home', note: '' };
    };

    const mergeRows = (dates, existing) => {
      const old = new Map(existing.map(r => [r.date.getTime(), r]));
      return dates.map(d => old.get(d.getTime()) || createRow(d));
    };

    const updateRow = (rows, i, field, value) =>
      rows.map((r, j) => j === i ? { ...r, [field]: value } : r);

    // ── Pure functions: view ──

    const dateColorClass = (dow) => dow === 0 ? 'text-red-600' : dow === 6 ? 'text-blue-600' : 'text-gray-800';
    const escapeAttr = (s) => s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const dateLabel = (date) => `${date.getMonth() + 1}/${date.getDate()}(${DAYS[date.getDay()]})`;

    const rowToHtml = (row, i) => {
      const label = dateLabel(row.date);
      const cls = dateColorClass(row.date.getDay());

      if (!row.enabled) return `<div class="bg-gray-100 rounded-lg border border-gray-200 px-3 py-2 flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="font-mono text-sm ${cls} opacity-60">${label}</span>
              <span class="text-xs text-gray-400">OFF</span>
            </div>
            <input type="checkbox" class="accent-blue-600 w-4 h-4 cursor-pointer" data-i="${i}" data-field="enabled">
          </div>`;

      const btns = ['work', 'lunch', 'dinner'].map(field => {
        const f = FIELDS[field], active = row[field] === f.activeVal ? 'active' : '';
        return `<button class="toggle-btn ${active}" data-i="${i}" data-field="${field}">${f[row[field]].btn}</button>`;
      }).join('\n              ');

      return `<div class="bg-white rounded-lg shadow-sm border p-3 relative">
            <input type="checkbox" class="absolute top-2.5 right-2.5 accent-blue-600 w-4 h-4 cursor-pointer"
              data-i="${i}" data-field="enabled" checked>
            <div class="font-mono font-bold text-base mb-2 ${cls}">${label}</div>
            <div class="flex items-center gap-2 flex-wrap">
              ${btns}
              <input type="text" maxlength="20" placeholder="備考" value="${escapeAttr(row.note)}"
                data-i="${i}" data-field="note"
                class="border rounded-md px-2 py-1.5 text-sm flex-1 min-w-28 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
          </div>`;
    };

    const rowsToOutputText = (rows) =>
      rows.filter(r => r.enabled).map(row => {
        let workLunch = FIELDS.work[row.work].text;
        if (row.work === 'office') workLunch += FIELDS.lunch[row.lunch].text;
        const parts = [workLunch];
        const dt = FIELDS.dinner[row.dinner].text;
        if (dt) parts.push(dt);
        if (row.note.trim()) parts.push(`（${row.note.trim()}）`);
        return `${dateLabel(row.date)}  ${parts.join(' ')}`;
      }).join('\n');

    // ── DOM references (single collection of side-effect targets) ──

    const $ = (id) => document.getElementById(id);
    const dom = {
      startDate: $('startDate'), endDate: $('endDate'),
      startLabel: $('startLabel'), endLabel: $('endLabel'),
      rows: $('scheduleRows'), output: $('output'), copyFeedback: $('copyFeedback'),
    };

    // ── State & rendering (side effects isolated here) ──

    let state = { rows: [] };

    const syncOutput = () => { dom.output.value = rowsToOutputText(state.rows); };

    const syncView = () => {
      dom.startLabel.textContent = formatLabel(dom.startDate.value);
      dom.endLabel.textContent = formatLabel(dom.endDate.value);
      dom.rows.innerHTML = state.rows.map(rowToHtml).join('');
      syncOutput();
    };

    const setRows = (rows) => { state = { rows }; syncView(); };

    const rebuild = () => {
      const start = parseDateValue(dom.startDate.value), end = parseDateValue(dom.endDate.value);
      if (isNaN(start) || isNaN(end) || start > end) return;
      setRows(mergeRows(dateRange(start, end), state.rows));
    };

    const initDates = () => {
      const { start, end } = defaultRange();
      dom.startDate.value = start;
      dom.endDate.value = end;
    };

    // ── Event binding ──

    function handleRowEvent(e) {
      const el = e.target.closest('[data-i]');
      if (!el) return;
      const i = parseInt(el.dataset.i), field = el.dataset.field;
      if (isNaN(i) || !field) return;

      if (field === 'enabled') {
        setRows(updateRow(state.rows, i, 'enabled', el.checked));
      } else if (field === 'note') {
        state = { rows: updateRow(state.rows, i, 'note', el.value) };
        syncOutput();
      } else if (FIELDS[field]) {
        setRows(updateRow(state.rows, i, field, FIELDS[field].flip[state.rows[i][field]]));
      }
    }

    dom.rows.addEventListener('click', handleRowEvent);
    dom.rows.addEventListener('input', handleRowEvent);
    dom.startDate.addEventListener('change', rebuild);
    dom.endDate.addEventListener('change', rebuild);
    $('recreateBtn').addEventListener('click', () => { state = { rows: [] }; rebuild(); });
    $('resetBtn').addEventListener('click', () => { state = { rows: [] }; initDates(); rebuild(); });
    $('copyBtn').addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(dom.output.value); }
      catch { dom.output.select(); document.execCommand('copy'); }
      dom.copyFeedback.classList.remove('hidden');
      setTimeout(() => dom.copyFeedback.classList.add('hidden'), 2000);
    });

    // ── Init ──

    initDates();
    rebuild();
  </script>
</body>
</html>
